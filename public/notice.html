<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Notice Board — Paul Harrison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:        #080c14;
      --surface:   #0d1525;
      --navy:      #0f2044;
      --accent:    #1a3a6e;
      --blue:      #2563eb;
      --blue-glow: #3b82f6;
      --text:      #e8edf5;
      --muted:     #6b7fa3;
      --border:    rgba(37,99,235,0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow-x: hidden;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: .5;
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none; z-index: 0;
    }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 6vw;
      background: rgba(8,12,20,.75);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.1rem;
      color: var(--text);
      letter-spacing: -.02em;
      text-decoration: none;
    }
    .nav-logo span { color: var(--blue-glow); }

    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-links a {
      font-size: .78rem; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
      text-decoration: none; transition: color .2s;
    }
    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--blue-glow); }

    /* MAIN */
    main {
      position: relative; z-index: 1;
      padding: 8rem 6vw 4rem;
    }

    /* HEADER */
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      margin-bottom: 3rem; flex-wrap: wrap; gap: 1.5rem;
    }

    .header-left .eyebrow {
      font-size: .7rem; letter-spacing: .18em;
      text-transform: uppercase; color: var(--blue-glow);
      margin-bottom: .6rem;
    }

    .header-left h1 {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(2rem, 5vw, 3.5rem);
      letter-spacing: -.04em;
      line-height: .95;
    }

    .header-left p {
      margin-top: .75rem;
      font-size: .8rem; color: var(--muted);
      max-width: 400px; line-height: 1.7;
    }

    .header-right { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; }

    /* FILTERS */
    .filters {
      display: flex; gap: .5rem; flex-wrap: wrap;
    }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: .65rem; letter-spacing: .1em;
      text-transform: uppercase;
      padding: .4rem .9rem; border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent; color: var(--muted);
      cursor: pointer; transition: all .2s;
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--blue-glow); }
    .filter-btn.active {
      background: rgba(37,99,235,.15);
      border-color: rgba(37,99,235,.4);
      color: var(--blue-glow);
    }
    .filter-btn.all.active { background: rgba(37,99,235,.15); border-color: rgba(37,99,235,.4); color: var(--blue-glow); }
    .filter-btn.f-update.active { background: rgba(37,99,235,.12); border-color: rgba(37,99,235,.35); color: #60a5fa; }
    .filter-btn.f-project.active { background: rgba(124,58,237,.12); border-color: rgba(124,58,237,.35); color: #a78bfa; }
    .filter-btn.f-life.active { background: rgba(5,150,105,.12); border-color: rgba(5,150,105,.35); color: #34d399; }
    .filter-btn.f-collab.active { background: rgba(217,119,6,.12); border-color: rgba(217,119,6,.35); color: #fbbf24; }

    .add-btn {
      font-family: 'DM Mono', monospace;
      font-size: .75rem; letter-spacing: .06em;
      padding: .65rem 1.25rem; border-radius: 4px;
      border: 1px solid var(--blue);
      background: var(--blue); color: #fff;
      cursor: pointer; transition: all .2s;
      white-space: nowrap;
    }
    .add-btn:hover { background: var(--blue-glow); box-shadow: 0 0 20px rgba(59,130,246,.35); }

    /* STATS BAR */
    .stats-bar {
      display: flex; gap: 2rem; flex-wrap: wrap;
      margin-bottom: 2.5rem;
      padding: 1rem 1.5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: rgba(13,21,37,.4);
    }

    .stat-item { display: flex; align-items: center; gap: .6rem; }
    .stat-dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
    .dot-all  { background: var(--blue-glow); }
    .dot-update  { background: #60a5fa; }
    .dot-project { background: #a78bfa; }
    .dot-life    { background: #34d399; }
    .dot-collab  { background: #fbbf24; }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 1rem;
      color: var(--text);
    }
    .stat-label { font-size: .68rem; color: var(--muted); }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(13,21,37,.7);
      padding: 1.5rem 1.25rem 1.25rem;
      cursor: pointer;
      transition: border-color .25s, transform .2s, box-shadow .25s;
      display: flex; flex-direction: column; gap: .6rem;
      min-height: 150px; position: relative; overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      opacity: 0; transition: opacity .25s;
    }
    .card.cat-update::before  { background: linear-gradient(90deg, transparent, #60a5fa, transparent); }
    .card.cat-project::before { background: linear-gradient(90deg, transparent, #a78bfa, transparent); }
    .card.cat-life::before    { background: linear-gradient(90deg, transparent, #34d399, transparent); }
    .card.cat-collab::before  { background: linear-gradient(90deg, transparent, #fbbf24, transparent); }

    .card:hover { border-color: rgba(37,99,235,.45); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.3); }
    .card:hover::before { opacity: 1; }

    .card-meta { display: flex; align-items: center; justify-content: space-between; }
    .badge {
      font-size: .58rem; letter-spacing: .1em; text-transform: uppercase;
      padding: .2rem .55rem; border-radius: 3px;
    }
    .badge.cat-update  { background: rgba(37,99,235,.15);  color: #60a5fa; }
    .badge.cat-project { background: rgba(124,58,237,.15); color: #a78bfa; }
    .badge.cat-life    { background: rgba(5,150,105,.15);  color: #34d399; }
    .badge.cat-collab  { background: rgba(217,119,6,.15);  color: #fbbf24; }

    .card-date { font-size: .6rem; color: var(--muted); }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: .95rem; line-height: 1.3;
    }
    .card-preview {
      font-size: .72rem; color: var(--muted); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-read { font-size: .62rem; color: var(--blue-glow); margin-top: auto; letter-spacing: .05em; }

    /* EMPTY */
    .empty {
      text-align: center; padding: 4rem 1rem;
      color: var(--muted); font-size: .8rem;
      grid-column: 1 / -1;
      border: 1px dashed var(--border); border-radius: 8px;
    }
    .empty-icon { font-size: 2rem; margin-bottom: .75rem; opacity: .5; }

    /* EXPAND OVERLAY */
    .overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(5,9,18,.88);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      opacity: 0; pointer-events: none; transition: opacity .22s;
      backdrop-filter: blur(4px);
    }
    .overlay.open { opacity: 1; pointer-events: all; }

    .expand {
      background: #0d1525;
      border: 1px solid rgba(37,99,235,.25);
      border-radius: 14px;
      padding: 2.5rem 2.25rem 2rem;
      max-width: 560px; width: 100%;
      position: relative;
      transform: translateY(16px); transition: transform .25s;
      max-height: 80vh; overflow-y: auto;
    }
    .overlay.open .expand { transform: translateY(0); }

    .expand-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem;
    }
    .expand-badge-wrap { display: flex; align-items: center; gap: .75rem; }
    .expand-date { font-size: .65rem; color: var(--muted); }

    .close-btn {
      width: 28px; height: 28px; border-radius: 50%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--muted); font-size: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s; font-family: 'DM Mono', monospace; flex-shrink: 0;
    }
    .close-btn:hover { background: rgba(255,255,255,.12); color: var(--text); }

    .expand-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.5rem;
      letter-spacing: -.025em; margin-bottom: 1rem; line-height: 1.2;
    }
    .expand-body { font-size: .85rem; color: var(--muted); line-height: 1.9; }

    .expand-footer {
      margin-top: 2rem; padding-top: 1rem;
      border-top: 1px solid rgba(37,99,235,.12);
      display: flex; justify-content: flex-end; gap: .6rem;
    }
    .del-btn {
      font-family: 'DM Mono', monospace;
      font-size: .65rem; color: var(--muted);
      background: none; border: 1px solid rgba(255,255,255,.06);
      border-radius: 4px; padding: .3rem .75rem;
      cursor: pointer; transition: all .2s;
    }
    .del-btn:hover { color: #f87171; border-color: rgba(248,113,113,.25); }
    .edit-btn {
      font-family: 'DM Mono', monospace;
      font-size: .65rem; color: var(--blue-glow);
      background: none; border: 1px solid rgba(37,99,235,.25);
      border-radius: 4px; padding: .3rem .75rem;
      cursor: pointer; transition: all .2s;
    }
    .edit-btn:hover { background: rgba(37,99,235,.1); }

    /* MODAL */
    .modal-wrap {
      position: fixed; inset: 0; z-index: 300;
      background: rgba(5,9,18,.88);
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      opacity: 0; pointer-events: none; transition: opacity .2s;
      backdrop-filter: blur(4px);
    }
    .modal-wrap.open { opacity: 1; pointer-events: all; }

    .modal {
      background: #0d1525;
      border: 1px solid rgba(37,99,235,.25);
      border-radius: 14px;
      padding: 2rem; max-width: 440px; width: 100%;
      position: relative;
      transform: translateY(12px); transition: transform .2s;
    }
    .modal-wrap.open .modal { transform: translateY(0); }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.2rem;
      margin-bottom: 1.5rem; color: var(--text);
    }

    .fg { display: flex; flex-direction: column; gap: .4rem; margin-bottom: 1rem; }
    .fg label {
      font-size: .62rem; letter-spacing: .1em;
      text-transform: uppercase; color: var(--muted);
    }
    .fg input, .fg textarea, .fg select {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: .65rem .9rem;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: .8rem; outline: none; transition: border-color .2s;
    }
    .fg input:focus, .fg textarea:focus, .fg select:focus { border-color: var(--blue); }
    .fg textarea { resize: vertical; min-height: 90px; }
    .fg select option { background: #0d1525; }

    .modal-actions {
      display: flex; gap: .6rem; justify-content: flex-end; margin-top: 1.25rem;
    }
    .mbtn {
      font-family: 'DM Mono', monospace;
      font-size: .72rem; padding: .55rem 1.1rem;
      border-radius: 4px; cursor: pointer; transition: all .2s;
    }
    .mbtn-outline {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .mbtn-outline:hover { color: var(--text); }
    .mbtn-primary {
      background: var(--blue); color: #fff;
      border: 1px solid var(--blue);
    }
    .mbtn-primary:hover { background: var(--blue-glow); }

    .modal-close {
      position: absolute; top: .9rem; right: .9rem;
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
      color: var(--muted); font-size: 13px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace; transition: all .2s;
    }
    .modal-close:hover { color: var(--text); background: rgba(255,255,255,.1); }

    /* LOADING */
    .loading-msg {
      text-align: center; padding: 3rem 1rem;
      color: var(--muted); font-size: .78rem;
      grid-column: 1 / -1;
    }
    .loading-msg .spin {
      display: inline-block;
      animation: spin 1.2s linear infinite;
      color: var(--blue-glow); font-size: .9rem; margin-bottom: .5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 6vw;
      display: flex; justify-content: space-between; align-items: center;
      font-size: .72rem; color: var(--muted);
      position: relative; z-index: 1;
    }
    footer a { color: var(--blue-glow); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .page-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">PH<span>.</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="index.html#skills">Skills</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="notice-board.html" class="active">Notice Board</a></li>
      <li><a href="index.html#contact">Contact</a></li>
      <li><a href="login.html">SignIn</a></li>
      <li><a href="signup.html">SignUp</a></li>
    </ul>
  </nav>

  <main>

    <!-- HEADER -->
    <div class="page-header">
      <div class="header-left">
        <p class="eyebrow">// pinned thoughts</p>
        <h1>Notice Board</h1>
        <p>Updates, projects, and life moments — posted as they happen.</p>
      </div>
      <div class="header-right">
        <div class="filters">
          <button class="filter-btn all active" onclick="setFilter('all', this)">All</button>
          <button class="filter-btn f-update"  onclick="setFilter('update', this)">Updates</button>
          <button class="filter-btn f-project" onclick="setFilter('project', this)">Projects</button>
          <button class="filter-btn f-life"    onclick="setFilter('life', this)">Life</button>
          <button class="filter-btn f-collab"  onclick="setFilter('collab', this)">Collab</button>
        </div>
        <button class="add-btn" onclick="openModal()">+ New notice</button>
      </div>
    </div>

    <!-- STATS BAR -->
    <div class="stats-bar" id="statsBar">
      <div class="stat-item">
        <span class="stat-dot dot-all"></span>
        <span class="stat-num" id="stat-all">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot dot-update"></span>
        <span class="stat-num" id="stat-update">0</span>
        <span class="stat-label">Updates</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot dot-project"></span>
        <span class="stat-num" id="stat-project">0</span>
        <span class="stat-label">Projects</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot dot-life"></span>
        <span class="stat-num" id="stat-life">0</span>
        <span class="stat-label">Life</span>
      </div>
      <div class="stat-item">
        <span class="stat-dot dot-collab"></span>
        <span class="stat-num" id="stat-collab">0</span>
        <span class="stat-label">Collabs</span>
      </div>
    </div>

    <!-- GRID -->
    <div class="grid" id="grid"></div>

  </main>

  <!-- EXPAND OVERLAY -->
  <div class="overlay" id="overlay">
    <div class="expand" id="expandBox">
      <div class="expand-top">
        <div class="expand-badge-wrap">
          <span class="badge" id="ex-badge"></span>
          <span class="expand-date" id="ex-date"></span>
        </div>
        <button class="close-btn" onclick="closeExpand()">✕</button>
      </div>
      <h2 class="expand-title" id="ex-title"></h2>
      <p class="expand-body" id="ex-body"></p>
      <div class="expand-footer">
        <button class="edit-btn" id="ex-edit">Edit notice</button>
        <button class="del-btn" id="ex-del">Remove notice</button>
      </div>
    </div>
  </div>

  <!-- ADD MODAL -->
  <div class="modal-wrap" id="modalWrap">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <h2>New notice</h2>
      <div class="fg"><label>Title</label><input id="inp-title" type="text" placeholder="Headline..." /></div>
      <div class="fg"><label>Body</label><textarea id="inp-body" placeholder="What do you want to say?"></textarea></div>
      <div class="fg"><label>Category</label>
        <select id="inp-cat">
          <option value="update">Update</option>
          <option value="project">Project</option>
          <option value="life">Life</option>
          <option value="collab">Collab</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="mbtn mbtn-outline" onclick="closeModal()">Cancel</button>
        <button class="mbtn mbtn-primary" onclick="addNotice()">Post →</button>
      </div>
    </div>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-wrap" id="editModalWrap">
    <div class="modal">
      <button class="modal-close" onclick="closeEditModal()">✕</button>
      <h2>Edit notice</h2>
      <div class="fg"><label>Title</label><input id="edit-title" type="text" placeholder="Headline..." /></div>
      <div class="fg"><label>Body</label><textarea id="edit-body" placeholder="What do you want to say?"></textarea></div>
      <div class="fg"><label>Category</label>
        <select id="edit-cat">
          <option value="update">Update</option>
          <option value="project">Project</option>
          <option value="life">Life</option>
          <option value="collab">Collab</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="mbtn mbtn-outline" onclick="closeEditModal()">Cancel</button>
        <button class="mbtn mbtn-primary" onclick="saveEdit()">Save →</button>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <a href="index.html">← Back to Portfolio</a>
    <span>© 2025 Paul Harrison</span>
  </footer> 

  <script>
    const API = 'https://selfintro-lg6q.onrender.com';
    const token = localStorage.getItem('ph_token');
    if (!token) window.location.replace('login.html');

    const CAT = { update: 'Update', project: 'Project', life: 'Life', collab: 'Collab' };
    let notices = [];
    let activeFilter = 'all';
    let openId = null;

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
    }

    function today() {
      return new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function updateStats() {
      document.getElementById('stat-all').textContent     = notices.length;
      document.getElementById('stat-update').textContent  = notices.filter(n => n.cat === 'update').length;
      document.getElementById('stat-project').textContent = notices.filter(n => n.cat === 'project').length;
      document.getElementById('stat-life').textContent    = notices.filter(n => n.cat === 'life').length;
      document.getElementById('stat-collab').textContent  = notices.filter(n => n.cat === 'collab').length;
    }

    function setFilter(cat, btn) {
      activeFilter = cat;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const g = document.getElementById('grid');
      const filtered = activeFilter === 'all' ? notices : notices.filter(n => n.cat === activeFilter);
      if (!filtered.length) {
        g.innerHTML = `
          <div class="empty">
            <div class="empty-icon">📋</div>
            ${activeFilter === 'all' ? 'No notices yet — post one above.' : `No ${CAT[activeFilter] || activeFilter} notices yet.`}
          </div>`;
        return;
      }
      g.innerHTML = filtered.map(n => `
        <div class="card cat-${n.cat}" onclick="openExpand(${n.id})">
          <div class="card-meta">
            <span class="badge cat-${n.cat}">${CAT[n.cat]}</span>
            <span class="card-date">${n.date}</span>
          </div>
          <div class="card-title">${escapeHtml(n.title)}</div>
          <div class="card-preview">${escapeHtml(n.body)}</div>
          <div class="card-read">Read →</div>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function openExpand(id) {
      const n = notices.find(x => x.id === id);
      if (!n) return;
      openId = id;
      document.getElementById('ex-badge').textContent = CAT[n.cat];
      document.getElementById('ex-badge').className = 'badge cat-' + n.cat;
      document.getElementById('ex-date').textContent = n.date;
      document.getElementById('ex-title').textContent = n.title;
      document.getElementById('ex-body').textContent = n.body;
      document.getElementById('ex-del').onclick = () => deleteNotice(id);
      document.getElementById('ex-edit').onclick = () => { closeExpand(); openEditModal(id); };
      document.getElementById('overlay').classList.add('open');
    }
    function closeExpand() {
      document.getElementById('overlay').classList.remove('open');
      openId = null;
    }

    async function deleteNotice(id) {
      await fetch(`${API}/api/notices/${id}`, { method: 'DELETE', headers: authHeaders() });
      closeExpand();
      loadNotices();
    }

    function openModal() { document.getElementById('modalWrap').classList.add('open'); }
    function closeModal() {
      document.getElementById('modalWrap').classList.remove('open');
      document.getElementById('inp-title').value = '';
      document.getElementById('inp-body').value = '';
    }

    async function addNotice() {
      const t = document.getElementById('inp-title').value.trim();
      const b = document.getElementById('inp-body').value.trim();
      const c = document.getElementById('inp-cat').value;
      if (!t) { document.getElementById('inp-title').focus(); return; }
      await fetch(`${API}/api/notices`, {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ title: t, body: b, cat: c })
      });
      closeModal();
      loadNotices();
    }

    function openEditModal(id) {
      const n = notices.find(x => x.id === id);
      if (!n) return;
      document.getElementById('edit-title').value = n.title;
      document.getElementById('edit-body').value = n.body;
      document.getElementById('edit-cat').value = n.cat;
      document.getElementById('editModalWrap').dataset.editId = id;
      document.getElementById('editModalWrap').classList.add('open');
    }
    function closeEditModal() { document.getElementById('editModalWrap').classList.remove('open'); }

    async function saveEdit() {
      const id = Number(document.getElementById('editModalWrap').dataset.editId);
      const t = document.getElementById('edit-title').value.trim();
      const b = document.getElementById('edit-body').value.trim();
      const c = document.getElementById('edit-cat').value;
      if (!t) { document.getElementById('edit-title').focus(); return; }
      await fetch(`${API}/api/notices/${id}`, {
        method: 'PUT',
        headers: authHeaders(),
        body: JSON.stringify({ title: t, body: b, cat: c })
      });
      closeEditModal();
      loadNotices();
    }

    document.getElementById('overlay').addEventListener('click', function(e) { if (e.target === this) closeExpand(); });
    document.getElementById('modalWrap').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.getElementById('editModalWrap').addEventListener('click', function(e) { if (e.target === this) closeEditModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeExpand(); closeModal(); closeEditModal(); } });

    async function loadNotices() {
      const g = document.getElementById('grid');
      g.innerHTML = `
        <div class="loading-msg">
          <div class="spin">⟳</div><br>
          Loading notices...
        </div>`;
      let attempts = 0;
      while (attempts < 10) {
        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 35000);
          const res = await fetch(`${API}/api/notices`, { signal: controller.signal, headers: authHeaders() });
          clearTimeout(timeout);
          if (res.status === 401) { localStorage.removeItem('ph_token'); window.location.replace('login.html'); return; }
          if (!res.ok) throw new Error('bad response');
          notices = await res.json();
          updateStats();
          render();
          return;
        } catch(e) {
          attempts++;
          g.innerHTML = `<div class="loading-msg"><div class="spin">⟳</div><br>Still waking up... (attempt ${attempts})</div>`;
          await new Promise(r => setTimeout(r, 4000));
        }
      }
      g.innerHTML = '<div class="empty"><div class="empty-icon">⚠</div>Server unavailable — please refresh.</div>';
    }

    loadNotices();

    // Nav: swap Sign In/Sign Up for username + logout
    (function() {
      const t = localStorage.getItem('ph_token');
      if (!t) return;
      try {
        const payload = JSON.parse(atob(t.split('.')[1]));
        const username = payload.username;
        const nav = document.querySelector('.nav-links');
        if (!nav) return;
        // Remove signin/signup links
        nav.querySelectorAll('a').forEach(a => {
          if (a.href.includes('login.html') || a.href.includes('signup.html')) {
            a.parentElement.remove();
          }
        });
        // Add username + logout
        nav.insertAdjacentHTML('beforeend', `
          <li><span style="color:var(--blue-glow);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;">${username}</span></li>
          <li><a href="#" onclick="localStorage.removeItem('ph_token');window.location.replace('index.html');" style="color:#f87171;">Logout</a></li>
        `);
      } catch(e) {}
    })();
  </script>
</body>
</html>
