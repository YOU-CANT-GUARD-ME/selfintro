<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Paul Harrison</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#080c14;--surface:#0d1525;--blue:#2563eb;--blue-glow:#3b82f6;--text:#e8edf5;--muted:#6b7fa3;--border:rgba(37,99,235,0.18);--danger:#f87171;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5;}
    body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(37,99,235,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(37,99,235,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0;}
    .orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
    .orb-1{width:600px;height:600px;top:-200px;right:-150px;background:radial-gradient(circle,rgba(37,99,235,.18),transparent 70%);}
    .orb-2{width:400px;height:400px;bottom:-150px;left:-100px;background:radial-gradient(circle,rgba(15,32,68,.5),transparent 70%);}
    .top-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.25rem 6vw;background:rgba(8,12,20,.6);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);}
    .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.1rem;color:var(--text);letter-spacing:-.02em;text-decoration:none;}
    .nav-logo span{color:var(--blue-glow);}
    .back-link{font-size:.72rem;letter-spacing:.08em;color:var(--muted);text-decoration:none;display:flex;align-items:center;gap:.4rem;transition:color .2s;}
    .back-link:hover{color:var(--text);}
    .card{position:relative;z-index:1;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:3rem 2.5rem 2.5rem;width:100%;max-width:420px;margin:1rem;animation:fadeUp .45s ease forwards;}
    .card::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--blue),transparent);border-radius:1px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    .card-header{text-align:center;margin-bottom:2.25rem;}
    .lock-wrap{width:52px;height:52px;border-radius:14px;background:rgba(37,99,235,.1);border:1px solid rgba(37,99,235,.22);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;}
    .lock-wrap svg{width:22px;height:22px;color:var(--blue-glow);stroke:currentColor;fill:none;stroke-width:2;}
    .card-header h1{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;letter-spacing:-.035em;margin-bottom:.35rem;}
    .card-header p{font-size:.75rem;color:var(--muted);line-height:1.6;}
    .form{display:flex;flex-direction:column;gap:1rem;}
    .fg{display:flex;flex-direction:column;gap:.4rem;}
    .fg label{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
    .input-wrap{position:relative;display:flex;align-items:center;}
    .input-wrap .ico{position:absolute;left:.85rem;width:15px;height:15px;color:var(--muted);stroke:currentColor;fill:none;stroke-width:2;pointer-events:none;transition:color .2s;flex-shrink:0;}
    .fg input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:7px;padding:.78rem 1rem .78rem 2.4rem;color:var(--text);font-family:'DM Mono',monospace;font-size:.82rem;outline:none;transition:border-color .2s,background .2s;}
    .fg input:focus{border-color:var(--blue);background:rgba(37,99,235,.05);}
    .fg input.err{border-color:var(--danger);}
    .error-box{display:none;font-size:.72rem;color:var(--danger);background:rgba(248,113,113,.07);border:1px solid rgba(248,113,113,.18);border-radius:6px;padding:.65rem .9rem;align-items:center;gap:.5rem;}
    .error-box.show{display:flex;}
    .error-box svg{width:14px;height:14px;stroke:var(--danger);fill:none;stroke-width:2;flex-shrink:0;}
    .divider{height:1px;background:var(--border);margin:.25rem 0;}
    .submit-btn{width:100%;padding:.85rem;background:var(--blue);color:#fff;border:1px solid var(--blue);border-radius:7px;font-family:'DM Mono',monospace;font-size:.82rem;letter-spacing:.06em;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;margin-top:.25rem;}
    .submit-btn:hover:not(:disabled){background:var(--blue-glow);box-shadow:0 0 24px rgba(59,130,246,.3);}
    .submit-btn:disabled{opacity:.55;cursor:not-allowed;}
    .spinner{width:15px;height:15px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:none;}
    .submit-btn.loading .btn-label{display:none;}
    .submit-btn.loading .spinner{display:block;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .card-footer{margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border);text-align:center;font-size:.7rem;color:var(--muted);}
    .card-footer a{color:var(--blue-glow);text-decoration:none;}
    .card-footer a:hover{text-decoration:underline;}
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="top-bar">
    <a href="index.html" class="nav-logo">PH<span>.</span></a>
    <a href="index.html" class="back-link">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Back to portfolio
    </a>
  </div>

  <div class="card">
    <div class="card-header">
      <div class="lock-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h1>Welcome back</h1>
      <p>Sign in to access the Notice Board.</p>
    </div>

    <div class="form">
      <div class="fg">
        <label>Username</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <input type="text" id="inp-user" placeholder="Enter username" autocomplete="username" />
        </div>
      </div>
      <div class="fg">
        <label>Password</label>
        <div class="input-wrap">
          <svg class="ico" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="inp-pass" placeholder="Enter password" autocomplete="current-password" />
        </div>
      </div>

      <div class="error-box" id="err-box">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="err-text">Incorrect username or password.</span>
      </div>

      <div class="divider"></div>

      <button class="submit-btn" id="submit-btn" onclick="doLogin()">
        <span class="btn-label">Sign In →</span>
        <span class="spinner"></span>
      </button>
    </div>

    <div class="card-footer">
      Don't have an account <a href="signup.html">SignUp</a>
    </div>
  </div>

  <script>
    const API = 'https://selfintro-lg6q.onrender.com';
    if (localStorage.getItem('ph_token')) window.location.replace('notice.html');
    document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

    function setError(msg) {
      document.getElementById('err-text').textContent = msg;
      document.getElementById('err-box').classList.add('show');
    }
    function clearError() {
      document.getElementById('err-box').classList.remove('show');
      document.getElementById('inp-user').classList.remove('err');
      document.getElementById('inp-pass').classList.remove('err');
    }

    async function doLogin() {
      const btn  = document.getElementById('submit-btn');
      const user = document.getElementById('inp-user').value.trim();
      const pass = document.getElementById('inp-pass').value;
      clearError();
      if (!user) { document.getElementById('inp-user').classList.add('err'); document.getElementById('inp-user').focus(); return; }
      if (!pass) { document.getElementById('inp-pass').classList.add('err'); document.getElementById('inp-pass').focus(); return; }
      btn.disabled = true; btn.classList.add('loading');
      try {
        const res  = await fetch(`${API}/api/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user,password:pass}) });
        const data = await res.json();
        if (res.ok && data.token) {
          localStorage.setItem('ph_token', data.token);
          window.location.replace('notice.html');
        } else {
          setError('Incorrect username or password.');
          document.getElementById('inp-pass').classList.add('err');
          document.getElementById('inp-pass').value = '';
          document.getElementById('inp-pass').focus();
        }
      } catch { setError('Could not reach server — please try again.'); }
      btn.disabled = false; btn.classList.remove('loading');
    }

    // Nav: swap Sign In/Sign Up for username + logout
    (function() {
      const t = localStorage.getItem('ph_token');
      if (!t) return;
      try {
        const payload = JSON.parse(atob(t.split('.')[1]));
        const username = payload.username;
        const nav = document.querySelector('.nav-links');
        if (!nav) return;
        // Remove signin/signup links
        nav.querySelectorAll('a').forEach(a => {
          if (a.href.includes('login.html') || a.href.includes('signup.html')) {
            a.parentElement.remove();
          }
        });
        // Add username + logout
        nav.insertAdjacentHTML('beforeend', `
          <li><span style="color:var(--blue-glow);font-size:.78rem;letter-spacing:.1em;text-transform:uppercase;">${username}</span></li>
          <li><a href="#" onclick="localStorage.removeItem('ph_token');window.location.replace('index.html');" style="color:#f87171;">Logout</a></li>
        `);
      } catch(e) {}
    })();
  </script>
</body>
</html>
